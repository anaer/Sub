mixed-port: 7890
mode: Rule
log-level: warning
allow-lan: true
bind-address: '*'
ipv6: false
udp: false
unified-delay: false
tcp-concurrent: false
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-url: https://mirror.ghproxy.com/https://github.com/anaer/yacd/archive/refs/heads/gh-pages.zip
secret: '666999'
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 8
geox-url:
  geoip: https://mirror.ghproxy.com/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat
  geosite: https://mirror.ghproxy.com/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat
  mmdb: https://mirror.ghproxy.com/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb
  asn: https://mirror.ghproxy.com/https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb
keep-alive-interval: 600
profile:
  store-selected: true
  store-fake-ip: true
ntp:
  enable: false
  write-to-system: true
  server: time.apple.com
  port: 123
  interval: 30
sniffer:
  enable: true
  parse-pure-ip: false
  override-destination: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8800
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.apple.com
  - +.linux.do
tun:
  enable: true
  stack: mixed
  dns-hijack:
  - any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: false
dns:
  enable: true
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:53
  ipv6: false
  ipv6-timeout: 300
  prefer-h3: true
  enhanced-mode: fake-ip
  cache-algorithm: arc
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
